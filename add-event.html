<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title style="font-family: 'Irish Grover', sans-serif;">Add Event - COSO</title>

    <link rel="stylesheet" href="index.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Irish+Grover&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <img src="logo.png" alt="COSO Logo">
<h1 style="font-family: 'Irish Grover', sans-serif;">COSO</h1>

        <nav>
            <ul>
                <li><a href="index.html"><img src="home.png" alt=""></a></li>
                <li><a href="messages.html"><img src="message.png" alt=""></a></li>
                <li><a href="notifications.html"><img src="bell.png" alt=""></a></li>
                <li><a href="profile.html"><img src="user.png" alt=""></a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h2>Add Your Event</h2>
        <form action="#" method="post" enctype="multipart/form-data">
            <!-- Flyer Upload -->
            <label for="event-flyer">Upload Event Flyer:</label>
            <input type="file" id="event-flyer" name="event-flyer" accept="image/*" required>

            <!-- Event Title -->
            <label for="event-title">Event Title:</label>
            <input type="text" id="event-title" name="event-title" placeholder="Enter event name" required>

            <!-- Event Date -->
            <label for="event-date">Event Date:</label>
            <input type="date" id="event-date" name="event-date" required>

            <!-- Event Description -->
            <label for="event-description">Event Description:</label>
            <textarea id="event-description" name="event-description" placeholder="Enter event details" required></textarea>

            <button type="submit" class="cta-button">Submit Event</button>
        </form>
    </main>
</body>
</html>
