<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title style="font-family: 'Irish Grover', sans-serif;">Messaging - COSO</title>

    <link rel="stylesheet" href="messages.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Irish+Grover&display=swap" rel="stylesheet">
    <script type="module" src="colleges and courses list.js"></script>
    <script type="module" src="index.js"></script>
</head>
<body>
    <header>
        <img class="coso-logo" src="logo.png" alt="not found">
<h1 style="font-family: 'Irish Grover', sans-serif;">COSO</h1>

        <nav>
            <ul>
                <li><a href="index.html"><img src="home.png" alt=""></a></li>
                <li><a href="messages.html"><img src="message.png" alt=""></a></li>
                <li><a href="notifications.html"><img src="bell.png" alt=""></a></li>
                <li><a href="profile.html"><img src="user.png" alt=""></a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h2>Your Messages</h2>
        <div class="messages">
            <div class="message sent">
                <span class="message-text">Hello!</span>
                <span class="timestamp">10:00 AM</span>
            </div>
            <div class="message received">
                <span class="message-text">Hi there!</span>
                <span class="timestamp">10:01 AM</span>
            </div>
            <!-- More messages can be added here -->
        </div>
        <div class="input-area">
            <input type="text" placeholder="Type a message..." class="message-input">
            <button class="send-button">Send</button>
        </div>
    </main>
    <script>
        // Add event listeners for navigation icons
        const homeIcon = document.querySelector('nav a[href="index.html"]');
        const messagesIcon = document.querySelector('nav a[href="messages.html"]');
        const notificationsIcon = document.querySelector('nav a[href="notifications.html"]');
        const profileIcon = document.querySelector('nav a[href="profile.html"]');

        homeIcon.addEventListener('click', function(event) {
            event.preventDefault();
            window.location.href = 'index.html';
        });

        messagesIcon.addEventListener('click', function(event) {
            event.preventDefault();
            window.location.href = 'messages.html';
        });

        notificationsIcon.addEventListener('click', function(event) {
            event.preventDefault();
            window.location.href = 'notifications.html';
        });

        profileIcon.addEventListener('click', function(event) {
            event.preventDefault();
            window.location.href = 'profile.html';
        });
    </script>
</body>
</html>
