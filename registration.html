<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration - COSO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+Bhai+2:wght@400..800&family=Edu+AU+VIC+WA+NT+Pre:wght@400..700&family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="registration.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="home.html">Home</a></li>
                <li><a href="messages.html">Messages</a></li>
                <li><a href="registration.html">Registration</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="newsFeed.html">News Feed</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="container">
            <h1>Register</h1>
            <form id="registrationForm">
                <label for="name">Name:</label>
                <input type="text" id="name" required>
                
                <label for="college">College:</label>
                <select id="college" required>
                    <option value="">Select College</option>
                    <option value="GTU - School of Management Studies (GSMS)">GTU - School of Management Studies (GSMS)</option>
                    <option value="GTU - School of Engineering and Technology (GTU-SET)">GTU - School of Engineering and Technology (GTU-SET)</option>
                    <option value="Kaushalya The Skill University">Kaushalya The Skill University</option>
                    <option value="Vishwakarma Government Engineering College (VGEC)">Vishwakarma Government Engineering College (VGEC)</option>
                    <option value="School of Applied Sciences & Technology (SAST - GTU)">School of Applied Sciences & Technology (SAST - GTU)</option>
                </select>
                
                <label for="course">Course:</label>
                <select id="course" required>
                    <option value="">Select Course</option>
                </select>
                
                <label for="year">Year:</label>
                <select id="year" required>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                </select>
                
                <label for="linkedin">LinkedIn:</label>
                <input type="url" id="linkedin" placeholder="https://www.linkedin.com/in/yourprofile">
                
                <label for="instagram">Instagram:</label>
                <input type="url" id="instagram" placeholder="https://www.instagram.com/yourprofile">
                
                <label for="contact">Contact:</label>
                <input type="tel" id="contact" required>
                
                <button type="submit">Register</button>
            </form>
        </div>
    </main>
    <script src="registration.js"></script>
</body>
</html>
