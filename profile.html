<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - COSO</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Baloo+Bhai+2:wght@400..800&family=Edu+AU+VIC+WA+NT+Pre:wght@400..700&family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="profile.css">
</head>

<body>
    <header>
        <nav>
            <ul>
                <h1 style="font-size: 40px; margin: 0; position: relative; left: 4px;  ">COSO</h1>
                <li><a href="index.html">Home</a></li>
                <li><a href="messages.html">Messages</a></li>
                <li><a href="profile.html">Profile</a></li>
                <li><a href="notifications.html">Notifications</a></li>

            </ul>
        </nav>
        <h1 style="text-align: center; margin: 0;">User Profile</h1>
    </header>

    <div class="container">
        <div class="profile-section">
            <div class="profile-header">
                <div id="profile-picture">
                    <img src="logo.png" , alt="Profile Picture" id="profile-photo-preview">
                    <label for="profile-photo" class="upload-btn">Change Photo</label>
                    <input type="file" id="profile-photo" accept="image/*" style="display: none;">
                </div>
                <div class="profile-info">
                    <h2 id="profile-name">John Doe</h2>
                    <p id="profile-college">University of Example</p>
                    <p id="profile-course">Computer Science</p>
                </div>
            </div>

            <div class="profile-actions">
                <button id="editProfileBtn" class="edit-btn hidden">Edit Profile</button>
            </div>
        </div>

        <div class="registration-section">
            <h2>Complete Your Registration</h2>
            <form id="registrationForm">
                <div class="form-group">
                    <label for="name">Full Name:</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="college">College:</label>
                    <select id="college" required>
                        <option value="">Select College</option>
                        <option value="GTU - School of Management Studies (GSMS)">GTU - School of Management Studies
                            (GSMS)</option>
                        <option value="GTU - School of Engineering and Technology (GTU-SET)">GTU - School of Engineering
                            and Technology (GTU-SET)</option>
                        <option value="Kaushalya The Skill University">Kaushalya The Skill University</option>
                        <option value="Vishwakarma Government Engineering College (VGEC)">Vishwakarma Government
                            Engineering College (VGEC)</option>
                        <option value="School of Applied Sciences & Technology (SAST - GTU)">School of Applied Sciences
                            & Technology (SAST - GTU)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="course">Course:</label>
                    <select id="course" required>
                        <option value="">Select Course</option>
                        
                    </select>
                </div>

                <div class="form-group">
                    <label for="year">Year:</label>
                    <select id="year" required>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                    </select>
                    <div id="passwordSection">
                        <div class="form-group">
                            <label for="passwordInput">Password:</label>
                            <input type="password" id="passwordInput" placeholder="Enter new password">
                        </div>
                       
                    </div>
                </div>

                <div class="form-group">
                    <button type="submit" class="submit-btn">Complete Registration</button>
                </div>
            </form>
        </div>


    </div>

    <script src="profile.js"></script>
</body>

</html>
